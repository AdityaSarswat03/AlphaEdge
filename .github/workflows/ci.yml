name: AlphaEdge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff black
      - run: ruff check src/ tests/
      - run: black --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          APP_ENV: test
          ENABLE_CLERK_AUTH: "false"
          FIREBASE_PROJECT_ID: ""
        run: pytest tests/ -v --tb=short --cov=src/alphaedge --cov-report=term-missing

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t alphaedge:${{ github.sha }} .
      - name: Test container starts
        run: |
          docker run -d --name alphaedge-test \
            -e APP_ENV=test \
            -e ENABLE_CLERK_AUTH=false \
            -p 8000:8000 \
            alphaedge:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop alphaedge-test
