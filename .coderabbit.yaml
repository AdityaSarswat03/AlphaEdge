# CodeRabbit AI Review Configuration
# https://coderabbit.ai/docs/configuration
language: "en-US"
tone_instructions: "You are reviewing a highly secure, production-grade fintech application (FastAPI + Next.js). Please be concise, professional, and focus heavily on OWASP security standards, performance optimizations (like React rendering or Pandas/Numpy efficiency), and best practices."
early_access: false
review:
  # Enable automatic reviews on new PRs
  auto_review: true
  # Do not review draft PRs until they are marked ready
  drafts: false
  # Ignore specific files
  ignore:
    - "frontend/package-lock.json"
    - "frontend/public/**"
    - "data/**"
    - "models/**"
chat:
  # Allow CodeRabbit to reply to comments you make on its reviews
  auto_reply: true
